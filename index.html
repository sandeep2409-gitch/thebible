<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>పరిశుద్ధ బైబిల్ ఆడియో</title>
    <style>
:root {
    --primary: #0056b3;
    --success: #28a745;
    --danger: #dc3545;
    --bg: #f0f2f5;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: var(--bg);
    margin: 0;
    padding: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.container {
    width: 100%;
    max-width: 500px;
    background: #ffffff;
    padding: 20px;
    border-radius: 30px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
}


h1 {
    color: var(--primary);
    font-size: 2rem;
    text-align: center;
}

.selection-group {
    margin-bottom: 20px;
}

label {
    display: block;
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 5px;
    color: #444;
}

select {
    width: 100%;
    padding: 18px;
    font-size: 1.4rem;
    border-radius: 15px;
    border: 3px solid var(--primary);
    background-color: #ffffff;
}


.status-card {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 20px;
    border: 1px solid #dddddd;
    margin-bottom: 20px;
    text-align: center;
}

#display-title {
    font-size: 1.6rem;
    font-weight: bold;
    color: #333333;
    margin-bottom: 10px;
}


.progress-area {
    width: 100%;
    height: 35px;
    background: #e0e0e0;
    border-radius: 20px;
    overflow: hidden;
}

#progress-bar {
    width: 0%;
    height: 100%;
    background: var(--primary);
}


.main-controls {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}


.btn {
    padding: 20px;
    font-size: 1.4rem;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    font-weight: bold;
    color: #ffffff;
    flex: 1;
}

.play-btn {
    background-color: var(--success);
}

.pause-btn {
    background-color: var(--danger);
}


.seek-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.seek-btn {
    background-color: #6c757d;
    font-size: 1rem;
}
    </style>
</head>
<body>

    <h1>పరిశుద్ధ బైబిల్</h1>

    <div class="container">
        <div class="selection-group">
            <label>పుస్తకం:</label>
            <select id="bookSelect" onchange="updateChapters()"></select>
        </div>

        <div class="selection-group">
            <label>అధ్యాయం:</label>
            <select id="chapterSelect" onchange="loadAudio()"></select>
        </div>

        <div class="status-card">
            <div id="display-title">సిద్ధంగా ఉంది...</div>
            <div class="progress-area">
                <div id="progress-bar"></div>
            </div>
        </div>

        <audio id="audioPlayer"></audio>

        <div class="main-controls">
            <button class="btn play-btn" onclick="playAudio()">▶ ప్లే</button>
            <button class="btn pause-btn" onclick="pauseAudio()">⏸ ఆపు</button>
        </div>

        <div class="seek-controls">
            <button class="btn seek-btn" onclick="skip(-15)">↺ 15 సెకన్లు</button>
            <button class="btn seek-btn" onclick="skip(15)">15 సెకన్లు ↻</button>
        </div>
    </div>

    <script>
  
        const bibleData = [
            {id:1, name:"ఆదికాండము", ch:50}, {id:2, name:"నిర్గమకాండము", ch:40}, {id:3, name:"లేవీయకాండము", ch:27}, {id:4, name:"సంఖ్యాకాండము", ch:36}, {id:5, name:"ద్వితీయోపదేశకాండము", ch:34}, {id:6, name:"యెహోషువ", ch:24}, {id:7, name:"న్యాయాధిపతులు", ch:21}, {id:8, name:"రూతు", ch:4}, {id:9, name:"1 సమూయేలు", ch:31}, {id:10, name:"2 సమూయేలు", ch:24}, {id:11, name:"1 రాజులు", ch:22}, {id:12, name:"2 రాజులు", ch:25}, {id:13, name:"1 దినవృత్తాంతములు", ch:29}, {id:14, name:"2 దినవృత్తాంతములు", ch:36}, {id:15, name:"ఎజ్రా", ch:10}, {id:16, name:"నెహెమ్యా", ch:13}, {id:17, name:"ఎస్తేరు", ch:10}, {id:18, name:"యోబు", ch:42}, {id:19, name:"కీర్తనలు", ch:150}, {id:20, name:"సామెతలు", ch:31}, {id:21, name:"ప్రసంగి", ch:12}, {id:22, name:"పరమగీతము", ch:8}, {id:23, name:"యెషయా", ch:66}, {id:24, name:"యిర్మీయా", ch:52}, {id:25, name:"విలాపవాక్యములు", ch:5}, {id:26, name:"యెహెజ్కేలు", ch:48}, {id:27, name:"దానియేలు", ch:12}, {id:28, name:"హోషేయ", ch:14}, {id:29, name:"యోవేలు", ch:3}, {id:30, name:"ఆమోసు", ch:9}, {id:31, name:"ఓబద్యా", ch:1}, {id:32, name:"యోనా", ch:4}, {id:33, name:"మీకా", ch:7}, {id:34, name:"నహూము", ch:3}, {id:35, name:"హబక్కూకు", ch:3}, {id:36, name:"జెఫన్యా", ch:3}, {id:37, name:"హగ్గయి", ch:2}, {id:38, name:"జెకర్యా", ch:14}, {id:39, name:"మలాకీ", ch:4},
            {id:40, name:"మత్తయి", ch:28}, {id:41, name:"మార్కు", ch:16}, {id:42, name:"లూకా", ch:24}, {id:43, name:"యోహాను", ch:21}, {id:44, name:"అపొస్తలుల కార్యములు", ch:28}, {id:45, name:"రోమీయులకు", ch:16}, {id:46, name:"1 కొరింథీయులకు", ch:16}, {id:47, name:"2 కొరింథీయులకు", ch:13}, {id:48, name:"గలతీయులకు", ch:6}, {id:49, name:"ఎఫెసీయులకు", ch:6}, {id:50, name:"ఫిలిప్పీయులకు", ch:4}, {id:51, name:"కొలొస్సయులకు", ch:4}, {id:52, name:"1 థెస్సలొనీకయులకు", ch:5}, {id:53, name:"2 థెస్సలొనీకయులకు", ch:3}, {id:54, name:"1 తిమోతికి", ch:6}, {id:55, name:"2 తిమోతికి", ch:4}, {id:56, name:"తీతుకు", ch:3}, {id:57, name:"ఫిలేమోనుకు", ch:1}, {id:58, name:"హెబ్రీయులకు", ch:13}, {id:59, name:"యాకోబు", ch:5}, {id:60, name:"1 పేతురు", ch:5}, {id:61, name:"2 పేతురు", ch:3}, {id:62, name:"1 యోహాను", ch:5}, {id:63, name:"2 యోహాను", ch:1}, {id:64, name:"3 యోహాను", ch:1}, {id:65, name:"యూదా", ch:1}, {id:66, name:"ప్రకటన గ్రంథము", ch:22}
        ];

        const audio = document.getElementById('audioPlayer');
        const bookSelect = document.getElementById('bookSelect');
        const chapterSelect = document.getElementById('chapterSelect');
        const progressBar = document.getElementById('progress-bar');
        const displayTitle = document.getElementById('display-title');

       
        function init() {
            bibleData.forEach(book => {
                let opt = document.createElement('option');
                opt.value = book.id;
                opt.innerHTML = book.name;
                bookSelect.appendChild(opt);
            });
            updateChapters();
        }

        function updateChapters() {
            const bookId = parseInt(bookSelect.value);
            const book = bibleData.find(b => b.id === bookId);
            chapterSelect.innerHTML = "";
            for (let i = 1; i <= book.ch; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerHTML = `అధ్యాయం ${i}`;
                chapterSelect.appendChild(opt);
            }
            loadAudio();
        }

        function loadAudio() {
            const bookId = bookSelect.value;
            const chapter = chapterSelect.value;
            const bookName = bibleData.find(b => b.id == bookId).name;
            
            audio.src = `audio/${bookId}/${chapter}.mp3`;
            displayTitle.innerText = `${bookName} - అధ్యాయం ${chapter}`;
            progressBar.style.width = '0%';
            audio.load();
        }

        function playAudio() { audio.play().catch(e => console.log("File missing")); }
        function pauseAudio() { audio.pause(); }
        function skip(sec) { audio.currentTime += sec; }

        audio.ontimeupdate = function() {
            if (audio.duration) {
                progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
            }
        };

        window.onload = init;
    </script>
</body>
</html>
